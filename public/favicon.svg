<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#13102A"/>
      <stop offset="100%" stop-color="#0A0A0F"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8C96A"/>
      <stop offset="100%" stop-color="#B8922A"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- Subtle outer ring -->
  <rect width="512" height="512" rx="100" fill="none" stroke="rgba(201,168,76,0.15)" stroke-width="2"/>

  <!-- Cross glow layer -->
  <rect x="224" y="88" width="64" height="336" rx="18" fill="rgba(201,168,76,0.18)" filter="url(#glow)"/>
  <rect x="104" y="168" width="304" height="64" rx="18" fill="rgba(201,168,76,0.18)" filter="url(#glow)"/>

  <!-- Cross vertical bar -->
  <rect x="228" y="92" width="56" height="328" rx="16" fill="url(#gold)"/>

  <!-- Cross horizontal bar -->
  <rect x="108" y="172" width="296" height="56" rx="16" fill="url(#gold)"/>

  <!-- Small circle at intersection for polish -->
  <circle cx="256" cy="200" r="18" fill="url(#bg)"/>
  <circle cx="256" cy="200" r="14" fill="url(#gold)" opacity="0.6"/>
</svg>
