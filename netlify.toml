[build]
  publish   = "public"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

# ── API ROUTES → Netlify Functions ─────────────────────────────
[[redirects]]
  from   = "/api/auth/*"
  to     = "/.netlify/functions/auth"
  status = 200

[[redirects]]
  from   = "/api/profile"
  to     = "/.netlify/functions/profile"
  status = 200

[[redirects]]
  from   = "/api/events"
  to     = "/.netlify/functions/events"
  status = 200

[[redirects]]
  from   = "/api/events/*"
  to     = "/.netlify/functions/events"
  status = 200

[[redirects]]
  from   = "/api/rsvp"
  to     = "/.netlify/functions/rsvp"
  status = 200

[[redirects]]
  from   = "/api/rsvp/*"
  to     = "/.netlify/functions/rsvp"
  status = 200

[[redirects]]
  from   = "/api/price-breakdown"
  to     = "/.netlify/functions/payments"
  status = 200

[[redirects]]
  from   = "/api/tax-estimate"
  to     = "/.netlify/functions/payments"
  status = 200

[[redirects]]
  from   = "/api/charge-listing-fee"
  to     = "/.netlify/functions/payments"
  status = 200

[[redirects]]
  from   = "/api/create-payment-intent"
  to     = "/.netlify/functions/payments"
  status = 200

[[redirects]]
  from   = "/api/connect-onboard"
  to     = "/.netlify/functions/payments"
  status = 200

[[redirects]]
  from   = "/webhook"
  to     = "/.netlify/functions/webhook"
  status = 200

# ── SPA fallback ────────────────────────────────────────────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
